<!DOCTYPE html>
<html>

<body
  style="

    display: flex;

    ">

    <p id="DateTimeElement" style="margin-right: 16px;">

  <script>

      function updateDateTime() {
        var currentDateTime = new Date().toLocaleString();

      updateDateTime();
      setInterval(updateDateTime, 1000);
